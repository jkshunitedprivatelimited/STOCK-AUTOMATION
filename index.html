<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Preconnect to backend database to speed up TLS handshakes -->
    <link
      rel="preconnect"
      href="https://vfhwuncpzbsjegmedvjr.supabase.co"
      crossorigin
    />

    <!-- SEO Meta Tags -->
    <title>JKSH United Pvt. Ltd. | Secure Enterprise Portal</title>
    <meta
      name="description"
      content="Official enterprise portal for JKSH United Pvt. Ltd. Secure access for store management, franchise owners, and administrators."
    />
    <meta
      name="keywords"
      content="JKSH, JKSH United, Enterprise Portal, Store Management, Stock Automation"
    />
    <meta name="author" content="JKSH United Pvt. Ltd." />

    <!-- Preload LCP Logo Image -->
    <link rel="preload" href="/logo.jpg" as="image" />

    <!-- Open Graph (for social media & iMessage/Slack previews) -->
    <meta
      property="og:title"
      content="JKSH United Pvt. Ltd. | Secure Enterprise Portal"
    />
    <meta
      property="og:description"
      content="Official enterprise portal for JKSH United Pvt. Ltd. Secure access for store management, franchise owners, and administrators."
    />
    <meta property="og:image" content="/logo.jpg" />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root">
      <style>
        .initial-loader-wrapper {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          width: 100vw;
          background-color: #f8fafc;
          font-family: system-ui, -apple-system, sans-serif;
        }
        .initial-spinner {
          height: 32px;
          width: 32px;
          border-radius: 50%;
          border: 4px solid #e2e8f0;
          border-top-color: rgb(0,100,55);
          animation: initial-spin 1s linear infinite;
          margin-bottom: 16px;
        }
        .initial-text {
          font-size: 12px;
          font-weight: 700;
          color: #94a3b8;
          text-transform: uppercase;
          letter-spacing: 0.1em;
        }
        @keyframes initial-spin {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
        }
      </style>
      <div class="initial-loader-wrapper">
        <div class="initial-spinner"></div>
        <div class="initial-text">Loading JKSH...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
